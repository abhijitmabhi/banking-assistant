spring:
  application:
    name: banking-assistant

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        model: claude-sonnet-4-6
        max-tokens: 1024
        temperature: 0.7

server:
  port: 8080

logging:
  level:
    org.springframework.ai: DEBUG
    com.ama.bankingassistant: DEBUG